<section class="offers-hero pt-5 mt-5">
  <div class="container text-center pt-5">
    <div class="row justify-content-center text-center mb-5">
      <div class="col-lg-7">
        <h6 class="text-primary fw-bold text-uppercase ls-wide">Our Offers</h6>
        <h2 class="display-5 fw-bold mb-3">Exclusive Offers</h2>
        <p class="text-secondary">Find quick answers to common questions about your upcoming stay at Lumina
          Grand.</p>
      </div>
    </div>
  </div>
</section>

<div class="container pb-5">
  <div class="row g-4">
    @for (offer of offers; track offer.id) {
    <div class="col-12 col-xl-6">
      <div class="offer-card d-flex flex-column flex-md-row h-100 rounded-4 shadow-sm overflow-hidden">

        <div class="offer-visual position-relative">
          <img [src]="offer.image" [alt]="offer.title" class="offer-img">
          <!-- <div class="category-tag">{{offer.category}}</div> -->
        </div>

        <div class="offer-details p-4 flex-grow-1 d-flex flex-column">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <h2 class="h4 fw-bold mb-0 text-truncate">{{offer.title}}</h2>
            <span class="text-primary fw-bold fs-5 text-nowrap ms-2">{{offer.discount}}</span>
          </div>

          <p class="text-secondary small mb-4">
            {{offer.description}}
          </p>

          <div class="mt-auto">
            <div class="promo-box d-flex align-items-center justify-content-between p-2 rounded-3 mb-3">
              <div class="ps-2">
                <small class="text-secondary d-block" style="font-size: 0.7rem;">PROMO CODE</small>
                <span class="fw-mono fw-bold text-uppercase">{{offer.code}}</span>
              </div>
              <button (click)="copyToClipboard(offer.code)" class="btn btn-sm btn-light rounded-pill px-3 shadow-sm">
                @if (copiedCode() === offer.code) {
                <i class="bi bi-check2 text-success me-1"></i> Copied
                } @else {
                <i class="bi bi-clipboard me-1"></i> Copy
                }
              </button>
            </div>

            <div class="d-flex align-items-center justify-content-between">
              <span class="small text-secondary"><i class="bi bi-clock me-1"></i> Ends {{offer.validUntil}}</span>
              <button class="btn btn-primary rounded-pill px-4 fw-bold">Book Deal</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    }
  </div>
</div>

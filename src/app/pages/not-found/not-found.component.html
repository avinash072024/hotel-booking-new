<section class="error-section d-flex align-items-center justify-content-center">
    <div class="container text-center">
        <div class="error-container position-relative">

            <div class="blob-glow"></div>

            <h1 class="error-code fw-black" [style.transform]="'translate(' + translateX + 'px,' + translateY + 'px)'">
                404
            </h1>

            <div class="glass-content p-4 p-md-5 rounded-5 border shadow-xl">
                <h2 class="fw-bold display-6 mb-3">Lost in Paradise?</h2>
                <p class="text-muted mb-4 mx-auto" style="max-width: 450px;">
                    The page you are looking for might have been removed, had its name changed, or is temporarily
                    unavailable. Let's get you back to luxury.
                </p>

                <div class="d-flex flex-column flex-md-row gap-3 justify-content-center">
                    <a routerLink="/" class="btn btn-primary rounded-pill px-5 py-3 fw-bold shadow-glow">
                        <i class="bi bi-house-door-fill me-2"></i>GO HOME
                    </a>
                    <button (click)="location.back()" class="btn btn-outline-secondary rounded-pill px-5 py-3 fw-bold">
                        <i class="bi bi-arrow-left me-2"></i>GO BACK
                    </button>
                </div>
            </div>

            <!-- <div class="mt-5">
                <p class="small text-uppercase fw-black letter-spacing-2 opacity-50">Or search our rooms</p>
                <div class="search-box mx-auto mt-3">

                            placeholder="Find a room...">
                        <button class="btn btn-primary rounded-pill px-4"><i class="bi bi-search"></i></button>
                    </div>
                </div>
            </div> -->

        </div>
    </div>
</section>

<section class="auth-page d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">

                <div
                    class="auth-card glass-card p-4 p-md-5 rounded-5 border shadow-2xl overflow-hidden position-relative">

                    @if (!isSubmitted()) {
                    <div class="fade-in">
                        <div class="text-center mb-4">
                            <div class="icon-circle mb-3 mx-auto">
                                <i class="bi bi-shield-lock-fill text-primary"></i>
                            </div>
                            <h2 class="fw-black mb-2">Forgot Password?</h2>
                            <p class="text-muted px-lg-4">No worries! Enter your email and we'll send you a link to
                                reset your password.</p>
                        </div>

                        <form (ngSubmit)="onSubmit()">
                            <div class="form-floating mb-4 custom-input">
                                <input type="email" class="form-control" id="email" placeholder="name@example.com"
                                    [(ngModel)]="email" name="email" required>
                                <label for="email">Email address</label>
                            </div>

                            <button type="submit"
                                class="btn btn-primary w-100 rounded-pill py-3 fw-black shadow-glow mb-3"
                                [disabled]="isLoading() || !email()">
                                @if (isLoading()) {
                                <span class="spinner-border spinner-border-sm me-2"></span> Sending...
                                } @else {
                                SEND RESET LINK
                                }
                            </button>

                            <div class="text-center">
                                <a routerLink="/login" class="text-decoration-none text-muted small fw-bold">
                                    <i class="bi bi-arrow-left me-1"></i> Back to Login
                                </a>
                            </div>
                        </form>
                    </div>
                    }

                    @else {
                    <div class="fade-in text-center py-3">
                        <div class="icon-circle success mb-4 mx-auto">
                            <i class="bi bi-envelope-check-fill text-success"></i>
                        </div>
                        <h2 class="fw-black mb-2">Check your Email</h2>
                        <p class="text-muted mb-4">
                            We've sent a password recovery link to: <br>
                            <strong class="text-emphasis">{{ email() }}</strong>
                        </p>

                        <div class="d-grid gap-3">
                            <button (click)="resetForm()" class="btn btn-outline-secondary rounded-pill py-3 fw-bold">
                                Didn't receive it? Try again
                            </button>
                            <a routerLink="/login" class="btn btn-primary rounded-pill py-3 fw-black shadow-glow">
                                RETURN TO LOGIN
                            </a>
                        </div>
                    </div>
                    }

                </div>

            </div>
        </div>
    </div>
</section>

<section class="support-wrapper pt-5 mt-5">
    <div class="container py-5">
        <div class="row justify-content-center text-center mb-5">
            <div class="col-lg-7">
                <h6 class="text-primary fw-bold text-uppercase ls-wide">Support Center</h6>
                <h2 class="display-5 fw-bold mb-3">How can we help you?</h2>
                <p class="text-secondary">Find quick answers to common questions about your upcoming stay at Lumina
                    Grand.</p>
            </div>
        </div>

        <div class="row g-5">
            <div class="col-lg-4">
                <div class="help-card p-4 rounded-4 mb-4 text-center">
                    <div class="icon-circle mb-3"><i class="bi bi-chat-dots-fill"></i></div>
                    <h5 class="fw-bold">Live Chat</h5>
                    <p class="small text-secondary">Average response time: 2 mins</p>
                    <button class="btn btn-outline-primary rounded-pill w-100 fw-bold">Start Chat</button>
                </div>

                <div class="help-card p-4 rounded-4 text-center">
                    <div class="icon-circle mb-3"><i class="bi bi-telephone-fill"></i></div>
                    <h5 class="fw-bold">Direct Line</h5>
                    <p class="small text-secondary">Available 24/7 for guests</p>
                    <button class="btn btn-primary rounded-pill w-100 fw-bold">Call Now</button>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="accordion modern-faq" id="faqAccordion">

                    @for (faq of faqs; track faq.q) {
                    <div class="accordion-item mb-4 border-0">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                [attr.data-bs-target]="'#faq-' + $index">
                                <span class="q-number me-3">{{$index + 1}}.</span>
                                <span class="fw-bold">{{faq.q}}</span>
                            </button>
                        </h2>
                        <div [id]="'faq-' + $index" class="accordion-collapse collapse" data-bs-parent="#faqAccordion">
                            <div class="accordion-body px-5 pb-4 pt-0 text-secondary border-0">
                                <hr class="my-3 opacity-10">
                                {{faq.a}}
                            </div>
                        </div>
                    </div>
                    }
                </div>
            </div>
        </div>
    </div>
</section>

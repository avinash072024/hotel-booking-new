<section class="py-5">
    <div class="container py-5 mt-5">
        <div class="text-center">
            <h6 class="text-primary fw-bold text-uppercase tracking-widest">Our Sanctuary</h6>
            <h2 class="display-5 fw-bold">Rooms & Suites</h2>
            <p class="text-secondary mx-auto" style="max-width: 600px;">
                Each room is designed to be a private oasis of luxury and comfort.
            </p>
        </div>

        <div class="row g-4 py-3">
            @for (room of featuredRooms; track room.id) {
            <div class="col-12 col-md-3 col-lg-4">
                <div class="card h-100 border-0 shadow-sm room-card group overflow-hidden">

                    <div class="ratio ratio-4x3 position-relative overflow-hidden rounded-t-4">
                        <img [src]="room.image" class="card-img-top room-img" [alt]="room.name">

                        <div class="price-pill">
                            <span class="fw-bold">${{room.price}}</span><small>/night</small>
                        </div>

                        <div class="card-overlay">
                            <a [routerLink]="['/rooms-details', room.id]" class="btn btn-light rounded-pill px-4 fw-bold" (click)="openQuickView(room); selectRoom(room)">
                                <i class="bi bi-eye-fill me-2"></i>Quick View
                            </a>
                        </div>  
                    </div>

                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="fw-bold mb-0">{{room.name}}</h5>
                            <span class="small text-primary fw-semibold bg-primary-subtle px-2 py-1 rounded">
                                <i class="bi bi-people-fill me-1"></i>{{room.capacity}}
                            </span>
                        </div>

                        <p class="text-secondary small mb-4 line-clamp-2">
                            {{room.description}}
                        </p>

                        <div class="d-flex gap-2">
                            <button class="btn btn-primary flex-grow-1 rounded-pill fw-bold py-2 shadow-sm">
                                Book Now
                            </button>
                            <button class="btn btn-outline-secondary rounded-pill px-3">
                                <i class="bi bi-heart"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            }
        </div>
    </div>
</section>

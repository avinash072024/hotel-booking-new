<section class="contact-wrapper">
    <div class="container pt-5 mt-5">
        <div class="row g-0 min-vh-100">
            <div class="col-lg-6 map-column">
                <div class="map-overlay d-none d-lg-flex">
                    <div class="info-pill glass-effect shadow-lg">
                        <i class="bi bi-geo-alt-fill text-primary"></i>
                        <span>Lumina Grand, Marine Drive, Mumbai</span>
                    </div>
                </div>
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3773.809312217621!2d72.82343907574268!3d18.940935556214534!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be7d1e7d7d2a3d7%3A0x673327d824d5538!2sMarine%20Drive%2C%20Mumbai!5e0!3m2!1sen!2sin!4v1708765432100!5m2!1sen!2sin"
                    class="google-map" allowfullscreen="" loading="lazy">
                </iframe>
            </div>

            <div class="col-lg-6 d-flex align-items-center bg-body">
                <div class="contact-form-container px-4 px-md-5 py-5 w-100">
                    <div class="mb-5">
                        <h1 class="display-5 fw-black mb-3">Let's Connect.</h1>
                        <p class="text-secondary lead">Have a question or a special request? Our concierge is ready to
                            assist you 24/7.</p>
                    </div>

                    <form class="modern-form">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control bg-body-tertiary border-0" id="name"
                                        placeholder="Name">
                                    <label for="name">Your Name</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input type="email" class="form-control bg-body-tertiary border-0" id="email"
                                        placeholder="Email">
                                    <label for="email">Email Address</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-floating mb-3">
                                    <select class="form-select bg-body-tertiary border-0" id="subject">
                                        <option selected>General Inquiry</option>
                                        <option>Reservation Support</option>
                                        <option>Event Hosting</option>
                                    </select>
                                    <label for="subject">What are you looking for?</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-floating mb-4">
                                    <textarea class="form-control bg-body-tertiary border-0" style="height: 150px"
                                        id="message" placeholder="Message"></textarea>
                                    <label for="message">Your Message</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <button
                                    class="btn btn-primary btn-lg rounded-pill px-5 py-3 w-100 fw-bold transition-all">
                                    Send Message <i class="bi bi-arrow-right ms-2"></i>
                                </button>
                            </div>
                        </div>
                    </form>

                    <div class="row mt-5 pt-4 border-top">
                        <div class="col-6 mb-3">
                            <span class="d-block text-muted small fw-bold text-uppercase">Direct Line</span>
                            <p class="fw-bold mb-0">+91 22 4567 8900</p>
                        </div>
                        <div class="col-6 mb-3">
                            <span class="d-block text-muted small fw-bold text-uppercase">Email Us</span>
                            <p class="fw-bold mb-0">hello&#64;lumina.com</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

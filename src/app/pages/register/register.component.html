<section class="register-container d-flex align-items-center justify-content-center">
    <div class="container py-5 my-5">
        <div class="row g-0 auth-wrapper overflow-hidden shadow-2xl rounded-5">

            <div
                class="col-lg-5 d-none d-lg-flex flex-column justify-content-between p-5 branding-side position-relative">
                <div class="z-2">
                    <a routerLink="/" class="auth-logo fw-black fs-3 text-white text-decoration-none">
                        <i class="bi bi-building-fill-check me-2"></i>{{appName1}}<span class="text-primary-light">{{appName2}}</span>
                    </a>
                </div>

                <div class="z-2 mb-5">
                    <h1 class="display-4 fw-black text-white mb-3">Begin Your <br> Journey.</h1>
                    <p class="text-white-50 lead">Unlock exclusive rates and personalized travel experiences today.</p>

                    <div class="feature-list mt-4">
                        <div class="d-flex align-items-center text-white mb-3">
                            <i class="bi bi-check-circle-fill text-primary-light me-3 fs-5"></i>
                            <span>Member-only secret prices</span>
                        </div>
                        <div class="d-flex align-items-center text-white mb-3">
                            <i class="bi bi-check-circle-fill text-primary-light me-3 fs-5"></i>
                            <span>Free room upgrades (Gold Members)</span>
                        </div>
                    </div>
                </div>

                <div class="overlay-gradient"></div>
            </div>

            <div class="col-lg-7 bg-body p-4 p-md-5 d-flex flex-column justify-content-center">
                <div class="form-content mx-auto w-100" style="max-width: 450px;">
                    <div class="mb-4">
                        <h2 class="fw-black mb-1">Create Account</h2>
                        <p class="text-muted">Already a member? <a routerLink="/login"
                                class="text-primary fw-bold text-decoration-none">Sign in here</a></p>
                    </div>

                    <form (ngSubmit)="onRegister()">
                        <div class="row g-3">
                            <div class="col-12">
                                <div class="form-floating custom-input">
                                    <input type="text" class="form-control rounded-4" id="fullName"
                                        placeholder="John Doe" [(ngModel)]="registerData.fullName" name="fullName"
                                        required>
                                    <label for="fullName">Full Name</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-floating custom-input">
                                    <input type="email" class="form-control rounded-4" id="email"
                                        placeholder="name@example.com" [(ngModel)]="registerData.email" name="email"
                                        required>
                                    <label for="email">Email address</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-floating position-relative custom-input">
                                    <input [type]="showPassword() ? 'text' : 'password'" class="form-control rounded-4"
                                        id="password" placeholder="Password" [(ngModel)]="registerData.password"
                                        name="password" required>
                                    <label for="password">Create Password</label>
                                    <button type="button"
                                        class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-muted pe-3"
                                        (click)="togglePassword()">
                                        <i class="bi" [class.bi-eye-fill]="!showPassword()"
                                            [class.bi-eye-slash-fill]="showPassword()"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="col-12 mt-3">
                                <div class="form-check custom-check">
                                    <input class="form-check-input" type="checkbox" id="terms"
                                        [(ngModel)]="registerData.agreeTerms" name="agreeTerms" required>
                                    <label class="form-check-label small text-muted ms-1" for="terms">
                                        I agree to the <a routerLink="/terms-of-use"
                                            class="text-primary text-decoration-none fw-bold">Terms of Use</a> and <a
                                            routerLink="/privacy-policy"
                                            class="text-primary text-decoration-none fw-bold">Privacy Policy</a>.
                                    </label>
                                </div>
                            </div>

                            <div class="col-12 mt-4">
                                <button type="submit"
                                    class="btn btn-primary w-100 rounded-pill py-3 fw-black shadow-glow d-flex align-items-center justify-content-center gap-2"
                                    [disabled]="isLoading() || !registerData.agreeTerms">
                                    @if (isLoading()) {
                                    <span class="spinner-border spinner-border-sm"></span> Creating Account...
                                    } @else {
                                    GET STARTED <i class="bi bi-chevron-right"></i>
                                    }
                                </button>
                            </div>
                        </div>

                        <div class="mt-5 pt-2">
                            <div class="position-relative text-center mb-4">
                                <hr class="text-muted opacity-25">
                                <span
                                    class="position-absolute top-50 start-50 translate-middle bg-body px-3 small text-muted text-uppercase letter-spacing-1">Fast
                                    Sign Up</span>
                            </div>

                            <div class="d-flex gap-3">
                                <button type="button"
                                    class="btn btn-outline-secondary w-100 rounded-pill py-2 shadow-sm">
                                    <i class="bi bi-google me-2"></i>Google
                                </button>
                                <button type="button"
                                    class="btn btn-outline-secondary w-100 rounded-pill py-2 shadow-sm">
                                    <i class="bi bi-apple me-2"></i>Apple
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</section>

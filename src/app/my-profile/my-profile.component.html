<section class="profile-page py-5 mt-5">
    <div class="container mt-5">
        <div class="row g-4">

            <div class="col-lg-4">
                <div class="card glass-card border-0 shadow-lg rounded-5 overflow-hidden sticky-top"
                    style="top: 100px;">
                    <div class="profile-cover"></div>
                    <div class="card-body text-center pt-0">
                        <div class="avatar-wrapper">
                            <img [src]="userProfile.avatar" class="profile-avatar shadow-lg" alt="Avatar">
                            <label for="avatar-upload" class="avatar-edit-btn">
                                <i class="bi bi-camera-fill"></i>
                                <input type="file" id="avatar-upload" hidden (change)="onAvatarChange($event)">
                            </label>
                        </div>

                        <h3 class="fw-black mt-3 mb-1">{{ userProfile.firstName }} {{ userProfile.lastName }}</h3>
                        <span class="badge bg-primary-subtle text-primary rounded-pill px-3 py-2 mb-4">
                            <i class="bi bi-patch-check-fill me-1"></i> {{ userProfile.membershipLevel }}
                        </span>

                        <div class="nav flex-column nav-pills custom-pills mt-2">
                            <button class="nav-link" [class.active]="activeTab() === 'personal'"
                                (click)="activeTab.set('personal')">
                                <i class="bi bi-person me-2"></i> Personal Details
                            </button>
                            <button class="nav-link" [class.active]="activeTab() === 'security'"
                                (click)="activeTab.set('security')">
                                <i class="bi bi-shield-lock me-2"></i> Password & Security
                            </button>
                            <button class="nav-link text-danger mt-4" routerLink="/logout">
                                <i class="bi bi-box-arrow-right me-2"></i> Sign Out
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card glass-card border-0 shadow-lg rounded-5 p-4 p-md-5">

                    @if (activeTab() === 'personal') {
                    <div class="fade-in">
                        <h2 class="fw-black mb-4">Personal Details</h2>
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="form-floating custom-floating">
                                    <input type="text" class="form-control" id="fName"
                                        [(ngModel)]="userProfile.firstName">
                                    <label for="fName">First Name</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating custom-floating">
                                    <input type="text" class="form-control" id="lName"
                                        [(ngModel)]="userProfile.lastName">
                                    <label for="lName">Last Name</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-floating custom-floating">
                                    <input type="email" class="form-control" id="email" [(ngModel)]="userProfile.email">
                                    <label for="email">Email Address</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-floating custom-floating">
                                    <input type="tel" class="form-control" id="phone" [(ngModel)]="userProfile.phone">
                                    <label for="phone">Phone Number</label>
                                </div>
                            </div>
                        </div>

                        <div class="mt-5 pt-4 border-top">
                            <button class="btn btn-primary rounded-pill px-5 py-3 fw-bold shadow-glow"
                                (click)="saveProfile()">
                                SAVE CHANGES
                            </button>
                        </div>
                    </div>
                    }

                    @if (activeTab() === 'security') {
                    <div class="fade-in">
                        <h2 class="fw-black mb-4">Security Settings</h2>
                        <div class="alert alert-info rounded-4 border-0 bg-info-subtle text-info mb-4">
                            <i class="bi bi-info-circle-fill me-2"></i>
                            Last password change was 3 months ago.
                        </div>

                        <div class="d-grid gap-4">
                            <div class="form-floating custom-floating">
                                <input type="password" class="form-control" id="curPass" placeholder="Current">
                                <label for="curPass">Current Password</label>
                            </div>
                            <div class="form-floating custom-floating">
                                <input type="password" class="form-control" id="newPass" placeholder="New">
                                <label for="newPass">New Password</label>
                            </div>
                        </div>

                        <div class="mt-5 pt-4 border-top">
                            <button class="btn btn-dark rounded-pill px-5 py-3 fw-bold">UPDATE PASSWORD</button>
                        </div>
                    </div>
                    }

                </div>
            </div>

        </div>
    </div>
</section>

<section class="pb-5 bg-body-tertiary">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-end mb-5">
            <div>
                <h6 class="text-primary fw-bold text-uppercase tracking-widest">Our Global Reach</h6>
                <h2 class="display-5 fw-bold mb-0">World-Class Destinations</h2>
            </div>
            <button routerLink="/destinations" class="btn btn-primary rounded-pill px-4 py-2 fw-bold">
                Explore All <i class="bi bi-geo-alt ms-2"></i>
            </button>
        </div>

        <div class="bento-grid">
            @for (dest of destinations; track dest.id) {
            <div class="bento-item" [ngClass]="'size-' + dest.size">
                <div class="dest-wrapper rounded-4 shadow-sm overflow-hidden">
                    <img [src]="dest.image" [alt]="dest.name" class="dest-img" (error)="dest.image = 'assets/img/placeholder-destination.jpg'">

                    <div class="dest-content">
                        <div class="glass-info p-3 rounded-3">
                            <h4 class="h5 fw-bold text-white mb-1">{{ dest.name }}</h4>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="text-white-50 small">{{ dest.rooms }} Properties</span>
                                <i class="bi bi-arrow-up-right-circle text-white fs-5"></i>
                            </div>
                            <a routerLink="/destinations" class="stretched-link"></a>
                        </div>
                    </div>
                </div>
            </div>
            }
        </div>
    </div>
</section>

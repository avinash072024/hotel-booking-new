<nav class="navbar navbar-expand-lg fixed-top transition-all" [class.scrolled]="isScrolled()"
    [class.navbar-dark]="!isScrolled() && currentTheme() === 'dark'">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" routerLink="/">
            <i class="bi bi-building-fill-check text-primary me-2"></i>{{appName1}}<span
                class="text-primary">{{appName2}}</span>
        </a>

        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
            data-bs-target="#headerNav">
            <!-- <span class="navbar-toggler-icon"></span> -->
            <i class="bi bi-grid-fill"></i>
        </button>

        <div class="collapse navbar-collapse" id="headerNav">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0 fw-medium">
                @for (item of navLinks; track $index) {
                <li class="nav-item"><a class="nav-link px-3" [routerLink]="item.path"
                        routerLinkActive="active-link fw-bold"
                        [routerLinkActiveOptions]="{exact: true}">{{item.label}}</a></li>
                }
            </ul>

            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-link nav-link p-0 theme-toggle-btn" (click)="toggleTheme()">
                    @if (currentTheme() === 'light') {
                    <i class="bi bi-moon-stars-fill fs-5"></i>
                    } @else {
                    <i class="bi bi-sun-fill fs-5 text-warning"></i>
                    }
                </button>

                <div class="dropdown">
                    <button class="btn btn-primary rounded-pill px-4 d-flex align-items-center gap-2 shadow-sm"
                        data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle fs-5"></i>
                        <span class="d-none d-sm-inline">Account</span>
                    </button>
                    <ul
                        class="dropdown-menu dropdown-menu-start dropdown-menu-sm-start dropdown-menu-md-start dropdown-menu-lg-end border-0 shadow-lg mt-3">
                        <li><a class="dropdown-item py-2" routerLink="/profile"><i class="bi bi-person me-2"></i>Profile</a></li>
                        <li><a class="dropdown-item py-2" routerLink="/my-booking"><i class="bi bi-calendar-check me-2"></i>My
                                Bookings</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item py-2 text-danger" routerLink="/"><i
                                    class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>

<nav class="navbar navbar-expand-lg fixed-top transition-all" [class.scrolled]="isScrolled() || isMenuOpen()"
    [class.navbar-dark]="!isScrolled() && !isMenuOpen() && currentTheme() === 'dark'">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" routerLink="/">
            <i class="bi bi-building-fill-check text-primary me-2"></i>
            {{appName1}}<span class="text-primary">{{appName2}}</span>
        </a>

        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
            data-bs-target="#headerNav" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen()">
            <div class="hamburger-icon" [class.open]="isMenuOpen()">
                <span></span><span></span><span></span>
            </div>
        </button>

        <div class="collapse navbar-collapse" id="headerNav" #navbarCollapse>
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0 fw-medium pt-3 pt-lg-0">
                @for (item of navLinks; track $index) {
                <li class="nav-item">
                    <a class="nav-link px-3 mb-2 mb-lg-0" [routerLink]="item.path"
                        routerLinkActive="active-link fw-bold" [routerLinkActiveOptions]="{exact: true}"
                        (click)="handleNavLinkClick()">
                        {{item.label}}
                    </a>
                </li>
                }
            </ul>

            <div class="d-flex align-items-center justify-content-center gap-3 pb-3 pb-lg-0">
                <button class="btn btn-link nav-link p-0 theme-toggle-btn" (click)="toggleTheme()">
                    @if (currentTheme() === 'light') {
                    <i class="bi bi-moon-stars-fill fs-5"></i>
                    } @else {
                    <i class="bi bi-sun-fill fs-5 text-warning"></i>
                    }
                </button>

                <div class="dropdown">
                    <button class="btn btn-primary rounded-pill px-4 d-flex align-items-center gap-2 shadow-sm"
                        data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle fs-5"></i>
                        <span class="d-none d-lg-inline">Account</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg mt-lg-3 animate slideIn">
                        <li><a class="dropdown-item py-2" routerLink="/my-profile" (click)="handleNavLinkClick()">
                                <i class="bi bi-person me-2"></i>Profile</a></li>
                        <li><a class="dropdown-item py-2" routerLink="/my-booking" (click)="handleNavLinkClick()">
                                <i class="bi bi-calendar-check me-2"></i>My Bookings</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item py-2 text-danger" routerLink="/" (click)="handleNavLinkClick()">
                                <i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>
